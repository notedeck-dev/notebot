services:
  bot:
    build: .
    restart: unless-stopped
    environment:
      NOTEBOT_HOST: ${NOTEBOT_HOST:?set NOTEBOT_HOST in .env}
      # docker secrets を使う場合は NOTEBOT_TOKEN_FILE に切り替える
      NOTEBOT_TOKEN: ${NOTEBOT_TOKEN:-}
      NOTEBOT_TOKEN_FILE: ${NOTEBOT_TOKEN_FILE:-}
      RUST_LOG: ${RUST_LOG:-notebot=info,notecli=warn}
    volumes:
      - notebot-data:/data

volumes:
  notebot-data:
